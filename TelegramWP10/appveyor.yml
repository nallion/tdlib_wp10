image: Visual Studio 2019

platform: ARM

configuration: Release

before_build:
  - nuget restore TelegramWP10.sln

build:
  project: TelegramWP10.sln
  verbosity: minimal

build_script:
  - msbuild TelegramWP10.sln /p:Configuration=Release /p:Platform=ARM /p:AppxPackageSigningEnabled=false /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never /p:AppxPackageDir="C:\projects\tdlib-wp10\AppPackages" /m

after_build:
  - ps: Get-ChildItem -Recurse -Filter "*.appx" | % { Push-AppveyorArtifact $_.FullName }
