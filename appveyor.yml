image: Visual Studio 2017
configuration: Release
platform: ARM
build: off

environment:
  PROJECT_DIR: c:\projects\tdlib-wp10
  MSBUILD: C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\MSBuild\15.0\Bin\MSBuild.exe
  SIGNTOOL: C:\Program Files (x86)\Windows Kits\10\bin\10.0.16299.0\x86\signtool.exe
  CERT_PUBLISHER: CN=TelegramWP10
  CERT_PFX: c:\projects\tdlib-wp10\sign\TelegramWP10.pfx
  CERT_PASSWORD: "1234"
  # Жёсткий путь — уже известен из диагностики
  UWP_TARGETS: C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\MSBuild\Microsoft\WindowsXaml\v15.0\Microsoft.Windows.UI.Xaml.CSharp.Targets

install:
  - set Platform=
  - set PATH=C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\MSBuild\15.0\Bin;%PATH%
  - cd /d %PROJECT_DIR%
  - nuget restore TelegramWP10.sln

before_build:
  - mkdir %PROJECT_DIR%\sign
  - ps: $cert = New-SelfSignedCertificate -Type Custom -Subject $env:CERT_PUBLISHER -KeyUsage DigitalSignature -FriendlyName "TelegramWP10" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}"); $pwd = ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText; Export-PfxCertificate -Cert $cert -FilePath $env:CERT_PFX -Password $pwd; Write-Host "Certificate generated:" $cert.Thumbprint

  - ps: |
      $t = $env:UWP_TARGETS
      if (-not (Test-Path $t)) { Write-Error "Targets not found: $t"; exit 1 }
      Write-Host "Using targets: $t"
      $xml = '<?xml version="1.0" encoding="utf-8"?>'
      $xml += '<Project ToolsVersion="15.0" DefaultTargets="Build" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">'
      $xml += '<Import Project="$(MSBuildExtensionsPath)\$(MSBuildToolsVersion)\Microsoft.Common.props" Condition="Exists(''$(MSBuildExtensionsPath)\$(MSBuildToolsVersion)\Microsoft.Common.props'')" />'
      $xml += '<PropertyGroup>'
      $xml += '<Configuration Condition=" ''$(Configuration)'' == '''' ">Debug</Configuration>'
      $xml += '<Platform Condition=" ''$(Platform)'' == '''' ">ARM</Platform>'
      $xml += '<ProjectGuid>{B2C3D4E5-F6A7-8901-BCDE-F12345678901}</ProjectGuid>'
      $xml += '<OutputType>AppContainerExe</OutputType>'
      $xml += '<AppDesignerFolder>Properties</AppDesignerFolder>'
      $xml += '<RootNamespace>TelegramClient</RootNamespace>'
      $xml += '<AssemblyName>TelegramClient</AssemblyName>'
      $xml += '<DefaultLanguage>ru-RU</DefaultLanguage>'
      $xml += '<TargetPlatformVersion>10.0.16299.0</TargetPlatformVersion>'
      $xml += '<TargetPlatformMinVersion>10.0.10586.0</TargetPlatformMinVersion>'
      $xml += '<MinimumVisualStudioVersion>14</MinimumVisualStudioVersion>'
      $xml += '<FileAlignment>512</FileAlignment>'
      $xml += '<ProjectTypeGuids>{A5A43C5B-DE2A-4C0C-9213-0A381AF9435A};{FAE04EC0-301F-11D3-BF4B-00C04F79EFBC}</ProjectTypeGuids>'
      $xml += '<PackageCertificateKeyFile>TelegramClient_TemporaryKey.pfx</PackageCertificateKeyFile>'
      $xml += '<AppxPackage>true</AppxPackage>'
      $xml += '</PropertyGroup>'
      $xml += '<PropertyGroup Condition="''$(Configuration)|$(Platform)'' == ''Release|ARM''">'
      $xml += '<OutputPath>bin\ARM\Release\</OutputPath>'
      $xml += '<DefineConstants>TRACE;NETFX_CORE;WINDOWS_UWP</DefineConstants>'
      $xml += '<Optimize>true</Optimize>'
      $xml += '<DebugType>pdbonly</DebugType>'
      $xml += '</PropertyGroup>'
      $xml += '<PropertyGroup Condition="''$(Configuration)|$(Platform)'' == ''Debug|ARM''">'
      $xml += '<DebugSymbols>true</DebugSymbols>'
      $xml += '<OutputPath>bin\ARM\Debug\</OutputPath>'
      $xml += '<DefineConstants>DEBUG;TRACE;NETFX_CORE;WINDOWS_UWP</DefineConstants>'
      $xml += '<Optimize>false</Optimize>'
      $xml += '<DebugType>full</DebugType>'
      $xml += '</PropertyGroup>'
      $xml += '<ItemGroup>'
      $xml += '<Reference Include="Newtonsoft.Json"><HintPath>..\packages\Newtonsoft.Json.10.0.3\lib\portable-net45+win8+wp8+wpa81\Newtonsoft.Json.dll</HintPath></Reference>'
      $xml += '</ItemGroup>'
      $xml += '<ItemGroup>'
      $xml += '<Page Include="App.xaml"><Generator>MSBuild:Compile</Generator><SubType>Designer</SubType></Page>'
      $xml += '<Page Include="LoginPage.xaml"><Generator>MSBuild:Compile</Generator><SubType>Designer</SubType></Page>'
      $xml += '<Page Include="ChatsPage.xaml"><Generator>MSBuild:Compile</Generator><SubType>Designer</SubType></Page>'
      $xml += '<Page Include="ChatPage.xaml"><Generator>MSBuild:Compile</Generator><SubType>Designer</SubType></Page>'
      $xml += '</ItemGroup>'
      $xml += '<ItemGroup>'
      $xml += '<Compile Include="App.xaml.cs"><DependentUpon>App.xaml</DependentUpon></Compile>'
      $xml += '<Compile Include="LoginPage.xaml.cs"><DependentUpon>LoginPage.xaml</DependentUpon></Compile>'
      $xml += '<Compile Include="ChatsPage.xaml.cs"><DependentUpon>ChatsPage.xaml</DependentUpon></Compile>'
      $xml += '<Compile Include="ChatPage.xaml.cs"><DependentUpon>ChatPage.xaml</DependentUpon></Compile>'
      $xml += '<Compile Include="TdService.cs" />'
      $xml += '<Compile Include="Properties\AssemblyInfo.cs" />'
      $xml += '</ItemGroup>'
      $xml += '<ItemGroup>'
      $xml += '<AppxManifest Include="Package.appxmanifest"><SubType>Designer</SubType></AppxManifest>'
      $xml += '</ItemGroup>'
      $xml += '<ItemGroup>'
      $xml += '<Content Include="Assets\StoreLogo.png" />'
      $xml += '<Content Include="Assets\SplashScreen.png" />'
      $xml += '<Content Include="Assets\Square150x150Logo.png" />'
      $xml += '<Content Include="Assets\Square44x44Logo.png" />'
      $xml += '<Content Include="Assets\Wide310x150Logo.png" />'
      $xml += '</ItemGroup>'
      $xml += '<ItemGroup>'
      $xml += '<ProjectReference Include="..\TdLib.Wrapper\TdLib.Wrapper.vcxproj"><Project>{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}</Project><n>TdLib.Wrapper</n></ProjectReference>'
      $xml += '</ItemGroup>'
      $xml += '<Import Project="' + $t + '" />'
      $xml += '</Project>'
      $p = "$env:PROJECT_DIR\TelegramClient\TelegramClient.csproj"
      [System.IO.File]::WriteAllText($p, $xml, [System.Text.Encoding]::UTF8)
      Write-Host "Written. Import line:"; Select-String "Import Project" $p

build_script:
  - set Platform=
  - cd /d %PROJECT_DIR%
  - '"%MSBUILD%" TelegramWP10.sln /p:Configuration=Release /p:Platform=ARM /p:AppxBundle=Always /p:AppxBundlePlatforms=ARM /p:AppxPackageSigningEnabled=false /m'

after_build:
  - ps: |
      $b = Get-ChildItem -Recurse -Filter "*.appxbundle" "$env:PROJECT_DIR" -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($b) { Copy-Item $b.FullName "c:\projects\TelegramWP10.appxbundle"; Write-Host "OK: $($b.FullName)" } else { Write-Warning "No appxbundle found" }

artifacts:
  - path: c:\projects\TelegramWP10.appxbundle
    name: TelegramWP10
