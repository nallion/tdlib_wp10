image: Visual Studio 2017
platform: ARM
configuration: Release

build:
  project: TelegramWP10.sln
  verbosity: minimal
  msbuild_arguments: /p:AppxPackageSigningEnabled=false /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never

artifacts:
  - path: 'TelegramWP10\bin\ARM\Release\*.appx'
    name: Telegram_ARM_Package
