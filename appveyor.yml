image: Visual Studio 2017

configuration: Release
platform: ARM

environment:
  VCPKG_TARGET_TRIPLET: arm-uwp
  OPENSSL_NO_ASM: 1

clone_folder: c:\projects\td

cache:
  - c:\tools\vcpkg\installed -> vcpkg_triplet.txt

install:
  # Инструменты
  - choco install gperf -y
  - choco install strawberryperl -y
  - choco install php -y
  - set PATH=C:\Strawberry\perl\bin;C:\tools\php83;%PATH%

  # Подготовка vcpkg (без обновления самого vcpkg!)
  - cd C:\tools\vcpkg
  - .\bootstrap-vcpkg.bat
  - vcpkg install zlib:%VCPKG_TARGET_TRIPLET% openssl:%VCPKG_TARGET_TRIPLET% --clean-after-build
  
  - cd %APPVEYOR_BUILD_FOLDER%
  - git submodule update --init --recursive

before_build:
  - mkdir build
  - cd build
  - >
    cmake -G "Visual Studio 15 2017"
    -A ARM
    -DCMAKE_SYSTEM_NAME=WindowsStore
    -DCMAKE_SYSTEM_VERSION=10.0
    -DCMAKE_TOOLCHAIN_FILE=C:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DTD_ENABLE_DOTNET=ON
    -DTD_ENABLE_LTO=OFF
    ..

build_script:
  - cd %APPVEYOR_BUILD_FOLDER%\build
  # Собираем ТОЛЬКО проект tdni. Это сэкономит около 20-30 минут.
  - msbuild tdlib.sln /t:tdni /p:Configuration=Release /p:Platform=ARM /m

artifacts:
  # Пути к готовым файлам после сборки только tdni
  - path: build\Release\tdni\tdni.dll
    name: tdni_dll
  - path: build\Release\tdni\tdni.winmd
    name: tdni_metadata

test: off
