image: Visual Studio 2017
platform: ARM
configuration: Release

build_script:
  - dir "C:\Program Files (x86)\Windows Kits\10\bin\"
  - msbuild TelegramWP10.sln /t:restore
  # Добавляем флаг вывода в конкретную папку для артефактов
  - msbuild TelegramWP10.sln /p:Configuration=Release /p:Platform=ARM /p:AppxPackageSigningEnabled=false /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never /p:AppxPackageDir="C:\projects\tdlib-wp10\AppPackages" /m

artifacts:
  # Теперь артефакт будет гарантированно лежать здесь
  - path: 'AppPackages\**\*.appx'
    name: Telegram_ARM_Package
