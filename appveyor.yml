image: Visual Studio 2017

configuration: Release
platform: ARM

environment:
  VCPKG_TARGET_TRIPLET: arm-uwp
  OPENSSL_NO_ASM: 1
  PROJECT_DIR: c:\projects\td

install:
  - mkdir %PROJECT_DIR%
  - git clone https://github.com/tdlib/td.git %PROJECT_DIR%
  - cd %PROJECT_DIR%
  - git submodule update --init --recursive
  - choco install gperf -y
  - choco install strawberryperl -y
  - choco install php -y
  - set PATH=C:\Strawberry\perl\bin;C:\tools\php83;%PATH%
  - cd C:\tools\vcpkg
  - .\bootstrap-vcpkg.bat
  - vcpkg install zlib:%VCPKG_TARGET_TRIPLET% openssl:%VCPKG_TARGET_TRIPLET% --clean-after-build
  - cd %PROJECT_DIR%

before_build:
  - mkdir build
  - cd build
  - >
    cmake -G "Visual Studio 15 2017"
    -A ARM
    -DCMAKE_SYSTEM_NAME=WindowsStore
    -DCMAKE_SYSTEM_VERSION=10.0
    -DCMAKE_TOOLCHAIN_FILE=C:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DTD_ENABLE_DOTNET=ON
    -DTD_ENABLE_LTO=OFF
    ..

build_script:
  - cd %PROJECT_DIR%\build
  # Динамический поиск файла проекта
  - for /f "delims=" %%i in ('dir /b /s tdni.vcxproj') do set "V_PROJ=%%i"
  - if not defined V_PROJ (echo "ERROR: tdni.vcxproj not found" && exit 1)
  - echo Building: %V_PROJ%
  - msbuild "%V_PROJ%" /p:Configuration=Release /p:Platform=ARM /m /p:AppxPackage=false

artifacts:
  # Рекурсивный поиск артефактов гарантирует их сбор из любой папки
  - path: "**\tdni.dll"
    name: tdni_dll
  - path: "**\tdni.winmd"
    name: tdni_metadata

test: off
