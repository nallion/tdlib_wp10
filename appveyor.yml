image: Visual Studio 2017

# Глобальная конфигурация сборки
configuration: Release

clone_folder: c:\projects\td

cache:
  - c:\tools\vcpkg\installed -> vcpkg_triplet.txt

environment:
  VCPKG_TARGET_TRIPLET: arm-uwp

install:
  # 1. Клонирование и подмодули
  - cd c:\projects\td
  - git submodule update --init --recursive

  # 2. Инструменты (gperf и php)
  - choco install gperf -y
  - choco install php -y
  - set PATH=C:\tools\php83;%PATH%

  # 3. Зависимости через vcpkg
  - echo %VCPKG_TARGET_TRIPLET% > vcpkg_triplet.txt
  - cd C:\tools\vcpkg
  - git pull
  - .\bootstrap-vcpkg.bat
  - vcpkg install openssl:%VCPKG_TARGET_TRIPLET% zlib:%VCPKG_TARGET_TRIPLET%
  - cd c:\projects\td

before_build:
  - mkdir build
  - cd build
  # Генерируем решение для ARM UWP
  - >
    cmake -G "Visual Studio 15 2017"
    -A ARM
    -DCMAKE_SYSTEM_NAME=WindowsStore
    -DCMAKE_SYSTEM_VERSION=10.0
    -DCMAKE_TOOLCHAIN_FILE=C:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DTD_ENABLE_DOTNET=ON
    -DTD_ENABLE_LTO=OFF
    ..

build:
  # Указываем путь к файлу решения
  project: build\tdlib.sln
  parallel: true
  verbosity: minimal

# Настройки артефактов (пути должны соответствовать структуре после сборки)
artifacts:
  - path: build\Release\tdni.dll
    name: tdni_dll
  - path: build\Release\tdni.winmd
    name: tdni_metadata

# Отключаем тесты, чтобы сэкономить время в облаке
test: off
