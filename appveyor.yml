image: Visual Studio 2017

configuration: Release
platform: ARM

environment:
  VCPKG_TARGET_TRIPLET: arm-uwp
  OPENSSL_NO_ASM: 1
  PROJECT_DIR: c:\projects\td

install:
  # 1. Клонирование
  - mkdir %PROJECT_DIR%
  - git clone https://github.com/tdlib/td.git %PROJECT_DIR%
  - cd %PROJECT_DIR%
  - git submodule update --init --recursive

  # 2. Инструментарий
  - choco install gperf -y
  - choco install strawberryperl -y
  - choco install php -y
  - set PATH=C:\Strawberry\perl\bin;C:\tools\php83;%PATH%

  # 3. Зависимости через "родной" vcpkg образа VS2017
  - cd C:\tools\vcpkg
  - .\bootstrap-vcpkg.bat
  - vcpkg install zlib:%VCPKG_TARGET_TRIPLET% openssl:%VCPKG_TARGET_TRIPLET% --clean-after-build
  
  - cd %PROJECT_DIR%

before_build:
  - mkdir build
  - cd build
  - >
    cmake -G "Visual Studio 15 2017"
    -A ARM
    -DCMAKE_SYSTEM_NAME=WindowsStore
    -DCMAKE_SYSTEM_VERSION=10.0
    -DCMAKE_TOOLCHAIN_FILE=C:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DTD_ENABLE_DOTNET=ON
    -DTD_ENABLE_LTO=OFF
    ..

build_script:
  # Переходим в папку, где CMake создал файлы проекта для UWP примера
  - cd %PROJECT_DIR%\build\example\uwp
  # Собираем напрямую проект WinRT компонента
  - msbuild tdni.vcxproj /p:Configuration=Release /p:Platform=ARM /m /p:AppxPackage=false

artifacts:
  # Поиск файлов в папке сборки примера
  - path: build\example\uwp\Release\tdni.dll
    name: tdni_dll
  - path: build\example\uwp\Release\tdni.winmd
    name: tdni_metadata

test: off
