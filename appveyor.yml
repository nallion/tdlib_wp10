image: Visual Studio 2017

# Включаем клонирование, если запускаем не из корня TDLib
# Если конфиг лежит внутри репозитория TDLib, этот блок можно пропустить
clone_folder: c:\projects\td

environment:
  VCPKG_TARGET_TRIPLET: arm-uwp

cache:
  - c:\tools\vcpkg\installed -> vcpkg_triplet.txt

install:
  # 1. Если репозиторий еще не склонирован (например, запуск через пустой проект)
  - cd c:\projects
  - if not exist td git clone https://github.com/tdlib/td.git
  - cd td
  - git submodule update --init --recursive

  # 2. Установка системных утилит (gperf и php критичны для генерации кода TDLib)
  - choco install gperf -y
  - choco install php -y
  - set PATH=C:\tools\php83;%PATH%

  # 3. Подготовка OpenSSL и Zlib через vcpkg для ARM (UWP)
  - echo %VCPKG_TARGET_TRIPLET% > vcpkg_triplet.txt
  - cd C:\tools\vcpkg
  - git pull
  - .\bootstrap-vcpkg.bat
  - vcpkg install openssl:%VCPKG_TARGET_TRIPLET% zlib:%VCPKG_TARGET_TRIPLET%
  
  # Возвращаемся в папку проекта
  - cd c:\projects\td

before_build:
  - mkdir build
  - cd build
  # 4. Генерация проекта Visual Studio для Windows Store (UWP)
  - >
    cmake -G "Visual Studio 15 2017"
    -A ARM
    -DCMAKE_SYSTEM_NAME=WindowsStore
    -DCMAKE_SYSTEM_VERSION=10.0
    -DCMAKE_TOOLCHAIN_FILE=C:/tools/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DTD_ENABLE_DOTNET=ON
    ..

build:
  project: c:\projects\td\build\tdlib.sln
  parallel: true
  verbosity: minimal
  configuration: Release

artifacts:
  # Основной результат для Windows Phone приложения (C# или C++)
  - path: build\Release\tdni.dll
    name: tdni_dll
  - path: build\Release\tdni.winmd
    name: tdni_metadata
