# ═══════════════════════════════════════════════════════════════
#  AppVeyor CI — сборка TDLib JSON для Windows Phone 10 (UWP)
#  Результат: tdjson.dll для ARM / ARM64 / x86 / x64
# ═══════════════════════════════════════════════════════════════

version: 1.0.{build}

# Visual Studio 2022 — MSVC 19.3+, поддержка C++17 и UWP ARM
image: Visual Studio 2022

# Одна конфигурация — build.ps1 сам собирает Debug+Release внутри
configuration: Release

# Не клонировать репозиторий автоматически — мы клонируем TDLib сами
clone_depth: 1

# ───────────────────────────────────────────────────────────────
# Переменные окружения
# ───────────────────────────────────────────────────────────────
environment:
  # Конкретный коммит vcpkg — НЕЛЬЗЯ менять, новее сломает arm-uwp
  VCPKG_COMMIT: bc3512a509f9d29b37346a7e7e929f9a26e66c7e
  VCPKG_ROOT: C:\vcpkg
  TDLIB_DIR: C:\tdlib

  # Параллельная компиляция MSVC
  CL: /MP

  # Сохранять кэш даже при ошибке (удобно для отладки)
  APPVEYOR_SAVE_CACHE_ON_ERROR: true

# ───────────────────────────────────────────────────────────────
# Кэш — экономит 1.5-2 часа на повторных сборках
# Инвалидируется при смене коммита vcpkg
# ───────────────────────────────────────────────────────────────
cache:
  # Установленные пакеты vcpkg (openssl + zlib для всех UWP triplet'ов)
  - C:\vcpkg\installed -> appveyor.yml
  - C:\vcpkg\packages  -> appveyor.yml
  # Промежуточные результаты сборки TDLib
  - C:\tdlib\example\uwp\build-uwp -> appveyor.yml

# ───────────────────────────────────────────────────────────────
# Установка инструментов
# ───────────────────────────────────────────────────────────────
install:
  # 1. Клонировать TDLib (последний master)
  - ps: |
      Write-Host "=== Cloning TDLib ===" -ForegroundColor Cyan
      if (-not (Test-Path $env:TDLIB_DIR)) {
        git clone --depth 1 https://github.com/tdlib/td.git $env:TDLIB_DIR
      } else {
        Write-Host "TDLib already cloned, pulling latest..." -ForegroundColor Yellow
        cd $env:TDLIB_DIR
        git pull
      }
      Write-Host "TDLib version:" -ForegroundColor Green
      cd $env:TDLIB_DIR
      git log --oneline -1

  # 2. Клонировать vcpkg на КОНКРЕТНЫЙ коммит
  - ps: |
      Write-Host "=== Setting up vcpkg (commit: $env:VCPKG_COMMIT) ===" -ForegroundColor Cyan
      if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
        git clone https://github.com/Microsoft/vcpkg.git $env:VCPKG_ROOT
        cd $env:VCPKG_ROOT
        git checkout $env:VCPKG_COMMIT
        .\bootstrap-vcpkg.bat -disableMetrics
      } else {
        Write-Host "vcpkg already bootstrapped" -ForegroundColor Yellow
        cd $env:VCPKG_ROOT
        # Убедиться что на правильном коммите
        $current = git rev-parse HEAD
        if ($current -ne $env:VCPKG_COMMIT) {
          Write-Host "Wrong vcpkg commit, fixing..." -ForegroundColor Red
          git checkout $env:VCPKG_COMMIT
          .\bootstrap-vcpkg.bat -disableMetrics
        }
      }

  # 3. Установить зависимости для всех UWP архитектур
  #    arm-uwp    → реальное устройство Windows Phone 10
  #    arm64-uwp  → новые ARM64 устройства
  #    x86-uwp    → эмулятор в Visual Studio
  #    x64-uwp    → эмулятор x64
  - ps: |
      Write-Host "=== Installing vcpkg dependencies ===" -ForegroundColor Cyan

      $packages = @(
        "gperf:x86-windows",
        "openssl:arm-uwp",
        "openssl:arm64-uwp",
        "openssl:x64-uwp",
        "openssl:x86-uwp",
        "zlib:arm-uwp",
        "zlib:arm64-uwp",
        "zlib:x64-uwp",
        "zlib:x86-uwp"
      )

      # Проверяем что уже установлено (из кэша)
      $installed = & "$env:VCPKG_ROOT\vcpkg.exe" list 2>$null
      $toInstall = @()

      foreach ($pkg in $packages) {
        $pkgName = $pkg -replace ":", " "
        if (-not ($installed | Where-Object { $_ -like "*$pkgName*" })) {
          $toInstall += $pkg
        }
      }

      if ($toInstall.Count -gt 0) {
        Write-Host "Installing: $($toInstall -join ', ')" -ForegroundColor Yellow
        & "$env:VCPKG_ROOT\vcpkg.exe" install $toInstall --disable-metrics
      } else {
        Write-Host "All packages already installed (from cache)" -ForegroundColor Green
      }

  # 4. Установить 7-Zip (нужен build.ps1 для создания VSIX архива)
  - ps: |
      Write-Host "=== Installing 7-Zip ===" -ForegroundColor Cyan
      if (-not (Test-Path "C:\Program Files\7-Zip\7z.exe")) {
        choco install 7zip --no-progress -y
      } else {
        Write-Host "7-Zip already installed" -ForegroundColor Green
      }

  # 5. Установить PHP (опционально, для XML документации)
  - ps: |
      Write-Host "=== Installing PHP ===" -ForegroundColor Cyan
      if (-not (Get-Command php -ErrorAction SilentlyContinue)) {
        choco install php --no-progress -y
      } else {
        Write-Host "PHP already installed" -ForegroundColor Green
      }

  # 6. Добавить gperf и 7-Zip в PATH
  - ps: |
      $paths = @(
        "C:\vcpkg\installed\x86-windows\tools\gperf",
        "C:\Program Files\7-Zip",
        "C:\tools\php"
      )
      foreach ($p in $paths) {
        if (Test-Path $p) {
          $env:PATH = "$p;$env:PATH"
          Write-Host "Added to PATH: $p" -ForegroundColor Green
        }
      }

  # 7. Проверить все инструменты перед сборкой
  - ps: |
      Write-Host "=== Tool verification ===" -ForegroundColor Cyan
      cmake --version
      Write-Host "---"
      gperf --version
      Write-Host "---"
      & "C:\Program Files\7-Zip\7z.exe" i 2>&1 | Select-Object -First 2
      Write-Host "---"
      php --version 2>&1 | Select-Object -First 1
      Write-Host "=== vcpkg installed packages ===" -ForegroundColor Cyan
      & "$env:VCPKG_ROOT\vcpkg.exe" list

# ───────────────────────────────────────────────────────────────
# Отключить стандартную сборку MSBuild — используем свой скрипт
# ───────────────────────────────────────────────────────────────
build: off

# ───────────────────────────────────────────────────────────────
# Основная сборка TDLib
# build.ps1 выполняет 6 конфигураций:
#   ARM Debug, ARM Release
#   ARM64 Debug, ARM64 Release
#   x86 Debug, x86 Release
#   x64 Debug, x64 Release
# Время: ~2-4 часа без кэша, ~20-30 мин с кэшем
# ───────────────────────────────────────────────────────────────
build_script:
  - ps: |
      Write-Host "=== Starting TDLib UWP build ===" -ForegroundColor Cyan
      Write-Host "Time: $(Get-Date)" -ForegroundColor Gray

      cd "$env:TDLIB_DIR\example\uwp"

      # Проверяем — возможно уже собрано из кэша
      $vsixExists  = Test-Path "build-uwp\vsix\tdlib.vsix"
      $nupkgExists = (Get-ChildItem "build-uwp\nupkg\*.nupkg" -ErrorAction SilentlyContinue).Count -gt 0

      if ($vsixExists -and $nupkgExists) {
        Write-Host "Build artifacts found in cache — skipping rebuild" -ForegroundColor Green
      } else {
        Write-Host "Building TDLib for UWP (this takes 2-4 hours)..." -ForegroundColor Yellow

        # Запускаем официальный build.ps1 с флагом -nupkg
        # -vcpkg_root  — путь к vcpkg
        # -nupkg       — дополнительно собрать NuGet пакет
        powershell -ExecutionPolicy ByPass `
          .\build.ps1 `
          -vcpkg_root $env:VCPKG_ROOT `
          -nupkg

        if ($LASTEXITCODE -ne 0) {
          Write-Host "Build FAILED with exit code $LASTEXITCODE" -ForegroundColor Red
          exit $LASTEXITCODE
        }
      }

      Write-Host "=== Build completed at $(Get-Date) ===" -ForegroundColor Green

# ───────────────────────────────────────────────────────────────
# Проверка результатов
# ───────────────────────────────────────────────────────────────
after_build:
  - ps: |
      Write-Host "=== Build results ===" -ForegroundColor Cyan
      cd "$env:TDLIB_DIR\example\uwp"

      # VSIX расширение
      if (Test-Path "build-uwp\vsix") {
        Write-Host "`n[VSIX Extension]" -ForegroundColor Yellow
        Get-ChildItem "build-uwp\vsix" -Recurse | Format-Table Name, @{L="Size (KB)";E={[math]::Round($_.Length/1KB,1)}}
      }

      # NuGet пакет
      if (Test-Path "build-uwp\nupkg") {
        Write-Host "`n[NuGet Package]" -ForegroundColor Yellow
        Get-ChildItem "build-uwp\nupkg" -Recurse | Format-Table Name, @{L="Size (KB)";E={[math]::Round($_.Length/1KB,1)}}
      }

      # DLL файлы по архитектурам
      Write-Host "`n[DLL files by architecture]" -ForegroundColor Yellow
      Get-ChildItem "build-uwp" -Recurse -Filter "tdjson.dll" | ForEach-Object {
        $arch = $_.DirectoryName -replace ".*build-uwp\\", "" -replace "\\.*", ""
        Write-Host "  [$arch] $($_.Name) — $([math]::Round($_.Length/1MB,2)) MB" -ForegroundColor Green
      }

# ───────────────────────────────────────────────────────────────
# Артефакты — что скачать после сборки
# ───────────────────────────────────────────────────────────────
artifacts:
  # VSIX расширение для Visual Studio
  - path: C:\tdlib\example\uwp\build-uwp\vsix\*.vsix
    name: TDLib-UWP-VSIX
    type: zip

  # NuGet пакет
  - path: C:\tdlib\example\uwp\build-uwp\nupkg\*.nupkg
    name: TDLib-UWP-NuGet
    type: NuGetPackage

  # DLL для ARM (Windows Phone 10 — реальное устройство)
  - path: C:\tdlib\example\uwp\build-uwp\release\retail\ARM\**\*
    name: TDLib-ARM-Release
    type: zip

  # DLL для ARM64
  - path: C:\tdlib\example\uwp\build-uwp\release\retail\ARM64\**\*
    name: TDLib-ARM64-Release
    type: zip

  # DLL для x86 (эмулятор)
  - path: C:\tdlib\example\uwp\build-uwp\release\retail\x86\**\*
    name: TDLib-x86-Release
    type: zip

  # DLL для x64
  - path: C:\tdlib\example\uwp\build-uwp\release\retail\x64\**\*
    name: TDLib-x64-Release
    type: zip

  # Логи при ошибке
  - path: C:\tdlib\example\uwp\build-uwp\**\*.log
    name: Build-Logs

